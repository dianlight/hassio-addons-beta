name: Build

on:
    pull_request:
        branches:
            - master
    workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  ARCHITECTURES: '["amd64", "aarch64"]'

jobs:
    init:
        name: Initialize build
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.matrix.outputs.matrix }}
            addon: ${{ steps.extract_branch.outputs.BR_PROJECT }}
            version: ${{ steps.version.outputs.VERSION }}
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Extract addon name from branch
              id: extract_branch
              shell: bash
              run: |
                  REF="${{ github.head_ref || github.ref_name }}"
                  echo "BR_PROJECT=${REF##*/}" >> "$GITHUB_OUTPUT"

            - name: Get version from config
              id: version
              shell: bash
              run: |
                  VERSION=$(grep '^version:' ${{ steps.extract_branch.outputs.BR_PROJECT }}/config.yaml | awk '{print $2}')
                  echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Get build matrix
              id: matrix
              uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
              with:
                  architectures: ${{ env.ARCHITECTURES }}
                  image-name: addon-${{ steps.extract_branch.outputs.BR_PROJECT }}
                  registry-prefix: dianlight

    build:
        name: Build ${{ matrix.arch }} image
        needs: init
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Build ${{ needs.init.outputs.addon }} addon
              uses: home-assistant/builder/actions/build-image@2026.03.2
              with:
                  arch: ${{ matrix.arch }}
                  container-registry: docker.io
                  container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
                  container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
                  context: ${{ needs.init.outputs.addon }}
                  cosign: "false"
                  image: ${{ matrix.image }}
                  image-tags: |
                      ${{ needs.init.outputs.version }}
                      latest
                  push: "true"
                  version: ${{ needs.init.outputs.version }}

    manifest:
        name: Publish multi-arch manifest
        needs: [init, build]
        runs-on: ubuntu-latest
        steps:
            - name: Publish multi-arch manifest
              uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
              with:
                  architectures: ${{ env.ARCHITECTURES }}
                  container-registry: docker.io
                  container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
                  container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
                  cosign: "false"
                  image-name: addon-${{ needs.init.outputs.addon }}
                  image-tags: |
                      ${{ needs.init.outputs.version }}
                      latest
                  registry-prefix: dianlight
